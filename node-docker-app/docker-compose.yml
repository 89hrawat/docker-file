version: "3.9"

# ── Development ──────────────────────────────────────────────────
# Run: docker compose up
services:
  app:
    build:
      context: .               # Build from current directory
      dockerfile: Dockerfile   # Use our multistage Dockerfile
      target: production       # Use the final production stage
    container_name: node-app
    ports:
      - "3000:3000"            # host:container
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env                   # Load secrets from .env file
    restart: unless-stopped    # Auto-restart on crash
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

